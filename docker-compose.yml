version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai-financial-advisor-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: ai-financial-advisor-web
    ports:
      - "5173:80"
    depends_on:
      - backend
